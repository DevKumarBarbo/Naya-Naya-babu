name: Run Bot

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: node deploy-commands.js
        env:
          TOKEN: ${{ secrets.BOT_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}

      - run: node index.js
        env:
          TOKEN: ${{ secrets.BOT_TOKEN }}
